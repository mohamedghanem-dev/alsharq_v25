name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Create android
        run: flutter create --platforms android .
      - name: Fix Kotlin and add Firebase plugin
        run: |
          sed -i "s/org.jetbrains.kotlin.android\" version \".*\"/org.jetbrains.kotlin.android\" version \"1.9.22\"/" android/settings.gradle
          sed -i "/id \"org.jetbrains.kotlin.android\"/a\    id \"com.google.gms.google-services\" version \"4.4.0\" apply false" android/settings.gradle
      - name: Add google-services
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
      - name: Add google-services plugin to app
        run: |
          sed -i '/id "com.android.application"/a\    id "com.google.gms.google-services"' android/app/build.gradle
      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: alsharq-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
