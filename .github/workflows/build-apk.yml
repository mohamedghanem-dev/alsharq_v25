name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create fresh Flutter project
        run: |
          flutter create --org com.alsharq temp_project
          cp -r lib temp_project/
          cp -r assets temp_project/
          cp pubspec.yaml temp_project/
          cp android/app/google-services.json temp_project/android/app/
          cp android/build.gradle temp_project/android/
          cp android/app/build.gradle temp_project/android/app/

      - name: Get dependencies
        run: |
          cd temp_project
          flutter pub get

      - name: Build APK
        run: |
          cd temp_project
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alsharq-app
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
