name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      - name: Create fresh project and copy source
        run: |
          flutter create --org com.alsharq alsharq_build
          cp -r lib alsharq_build/
          cp -r assets alsharq_build/
          cp pubspec.yaml alsharq_build/
          cp android/app/google-services.json alsharq_build/android/app/
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' alsharq_build/android/app/build.gradle.kts
          sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "27.0.12077973"/' alsharq_build/android/app/build.gradle.kts
          echo 'id("com.google.gms.google-services") version "4.4.0" apply false' >> alsharq_build/android/settings.gradle.kts
          sed -i '/^plugins {/a\    id("com.google.gms.google-services")' alsharq_build/android/app/build.gradle.kts

      - name: Get dependencies
        run: |
          cd alsharq_build
          flutter pub get

      - name: Build APK
        run: |
          cd alsharq_build
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alsharq-app
          path: alsharq_build/build/app/outputs/flutter-apk/app-release.apk
