name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: 'stable'

      - name: Create fresh project and copy source
        run: |
          flutter create --org com.alsharq alsharq_build
          cp -r lib alsharq_build/
          cp -r assets alsharq_build/
          cp pubspec.yaml alsharq_build/
          cp android/app/google-services.json alsharq_build/android/app/
          cd alsharq_build/android
          sed -i "s/kotlin(\"android\") version \"[^\"]*\"/kotlin(\"android\") version \"1.9.22\"/" settings.gradle
          echo "compileSdkVersion=35" >> local.properties

      - name: Get dependencies
        run: |
          cd alsharq_build
          flutter pub get

      - name: Build APK
        run: |
          cd alsharq_build
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alsharq-app
          path: alsharq_build/build/app/outputs/flutter-apk/app-release.apk
