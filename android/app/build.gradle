plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-plugin-loader"
    id "com.google.gms.google-services"
}

android {
    namespace "com.alsharq.app"
    compileSdk 34
    ndkVersion "25.1.8937393"

    defaultConfig {
        applicationId "com.alsharq.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}
